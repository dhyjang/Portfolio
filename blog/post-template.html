<!--
  FIELD NOTES POST TEMPLATE
  =========================
  How to publish a new note, in three steps:

  STEP 1 — Copy this file
  Duplicate this file and rename it to a short, url-safe slug matching
  your post's topic, e.g. "designing-for-ai-literacy.html"
  (lowercase, words separated by hyphens, no spaces or punctuation).

  STEP 2 — Fill in your content
  Replace everything in ALL CAPS below with your real title, date,
  and text. Leave the surrounding HTML tags alone. Write your post
  content as a series of <p> paragraphs; use <p class="pull">...</p>
  for a pull-quote if you want one, and add or remove <span> tags
  inside the .tags div at the bottom to match your topic.

  STEP 3 — Add it to posts.json
  Open blog/posts.json and add a new entry to the array (copy the
  format of the existing entry). Use the SAME slug as your filename
  (without ".html"), and match the date format YYYY-MM-DD. The
  listing page picks up new entries automatically — no other file
  needs to change.

  That's the whole process. No build step, no rebuild, just these
  two files.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOUR POST TITLE — Daniel Jang</title>
<meta name="description" content="A ONE-SENTENCE SUMMARY OF THE POST, MATCHING THE EXCERPT IN posts.json.">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<meta name="theme-color" content="#083E42">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F7F5F0; --ink: #1A2426; --ink-soft: #3F4E4F;
    --evergreen: #0E5A5E; --evergreen-deep: #083E42; --marigold: #C0392B;
    --line: #D5D0C5; --card: #FCFBF7; --focus: #C0392B;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Public Sans", -apple-system, sans-serif; background: var(--paper); color: var(--ink); line-height: 1.75; font-size: 1.125rem; }
  :focus-visible { outline: 3px solid var(--focus); outline-offset: 3px; border-radius: 2px; }
  ::selection { background: var(--evergreen-deep); color: #fff; }
  .skip-link { position: absolute; top: -100px; left: 1rem; background: var(--evergreen-deep); color: #fff; padding: 0.6rem 1.1rem; border-radius: 0 0 8px 8px; text-decoration: none; font-weight: 600; z-index: 100; }
  .skip-link:focus { top: 0; }
  .wrap { max-width: 42rem; margin: 0 auto; padding: 0 1.5rem; }
  header { border-bottom: 1px solid var(--line); padding: 1.1rem 0; }
  .wordmark { font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: 1.15rem; color: var(--ink); text-decoration: none; display: inline-flex; align-items: center; min-height: 44px; }
  .wordmark span { color: var(--evergreen); }
  main { padding: 3.5rem 0 4rem; }
  .crumb { font-family: "IBM Plex Mono", monospace; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--evergreen); margin-bottom: 0.8rem; }
  .crumb a { color: var(--evergreen); }
  .post-date { color: var(--ink-soft); font-size: 0.95rem; margin-bottom: 1rem; }
  h1 { font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: clamp(1.7rem, 4vw, 2.3rem); letter-spacing: -0.02em; line-height: 1.25; margin-bottom: 1.6rem; }
  p + p { margin-top: 1rem; }
  a { color: var(--evergreen-deep); font-weight: 500; }
  .pull { border-left: 4px solid var(--marigold); padding: 0.3rem 0 0.3rem 1.1rem; margin: 1.6rem 0; font-family: "Bricolage Grotesque", sans-serif; font-size: 1.15rem; font-weight: 600; color: var(--evergreen-deep); }
  .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 2rem 0 0; }
  .tags span { font-family: "IBM Plex Mono", monospace; font-size: 0.78rem; padding: 0.22rem 0.65rem; border-radius: 999px; background: rgba(14, 90, 94, 0.12); color: var(--evergreen-deep); }
  .back { display: inline-flex; align-items: center; min-height: 44px; margin-top: 2.5rem; background: var(--evergreen-deep); color: #fff; text-decoration: none; font-weight: 600; padding: 0.7rem 1.5rem; border-radius: 8px; }
  .back:hover { background: var(--evergreen); }
  footer { border-top: 1px solid var(--line); padding: 1.8rem 0 2.5rem; color: var(--ink-soft); font-size: 0.95rem; }
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>
<header>
  <div class="wrap"><a class="wordmark" href="../index.html">Daniel Jang<span>.</span></a></div>
</header>
<main id="main">
  <article class="wrap">
    <p class="crumb"><a href="index.html">Blog</a></p>
    <p class="post-date">MONTH DAY, YEAR</p>
    <h1>YOUR POST TITLE</h1>

    <p>Your opening paragraph.</p>

    <p>More paragraphs as needed.</p>

    <p class="pull">An optional pull-quote for the strongest sentence in the post.</p>

    <p>Closing thoughts.</p>

    <div class="tags"><span>TAG ONE</span><span>TAG TWO</span></div>

    <a class="back" href="index.html">← All notes</a>
  </article>
</main>
<footer>
  <div class="wrap"><p>© 2026 Daniel Jang — <a href="../index.html">back to the portfolio</a></p></div>
</footer>
</body>
</html>
